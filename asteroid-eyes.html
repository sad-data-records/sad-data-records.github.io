<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asteroid Eyes | Sad Data Records</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:#f5f5f5;
    font-family:'Oswald',sans-serif;
    line-height:1.6;
}

a{
    text-decoration:none;
    color:inherit;
}

img{
    display:block;
}

header{
    background:#fff;
    text-align:center;
    padding:55px 20px 45px;
    border-bottom:4px solid #111;
}

.logo{
    width:90%;
    max-width:650px;
    margin:auto;
    cursor:pointer;
}

nav{
    margin-top:35px;
}

nav a{
    color:#111;
    margin:0 18px;
    text-transform:uppercase;
    letter-spacing:2px;
    font-weight:700;
}

nav a:hover{
    color:#777;
}

section{
    max-width:1200px;
    margin:auto;
    padding:70px 20px;
}

.section-title{
    font-size:2.5rem;
    margin-bottom:35px;
    border-bottom:2px solid #444;
    display:inline-block;
}

.artist-header{
    text-align:center;
}

.artist-header h1{
    font-size:4rem;
    margin-bottom:10px;
}

.artist-header p{
    color:#ff6666;
    letter-spacing:3px;
    text-transform:uppercase;
}

.releases{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:30px;
}

.release{
    background:#1b1b1b;
    border:1px solid #333;
    padding:15px;
    transition:.25s;
}

.release:hover{
    border-color:#777;
}

.release img{
    width:100%;
}

.release h3{
    margin-top:12px;
}

.button{
    display:inline-block;
    margin-top:15px;
    padding:10px 18px;
    background:#fff;
    color:#111;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:50px;
    border-top:2px solid #333;
    color:#777;
}

@media(max-width:900px){

.artist-header h1{
    font-size:2.8rem;
}

nav a{
    display:inline-block;
    margin:8px 10px;
}

}

</style>

</head>

<body>

<header>

<a href="index.html">
    <img src="images/logo.svg" class="logo" alt="Sad Data Records">
</a>

<nav>
    <a href="index.html#roster">Roster</a>
    <a href="index.html#releases">Releases</a>
    <a href="index.html#merch">Represent</a>
</nav>

</header>


<section>

<div class="artist-header">

<p>ARTIST</p>

<h1>ASTEROID EYES</h1>

</div>

</section>


<section>

<h2 class="section-title">RELEASES</h2>

<div class="releases">


<div class="release">

<img src="images/asteroideyes.jpg" alt="Asteroid Eyes Self-Titled">

<h3>Self-Titled</h3>

<a class="button"
href="https://ffm.to/asteroideyes-self-titled"
target="_blank"
rel="noopener">
Listen
</a>

</div>


</div>

</section>


<footer>

© 2026 SAD DATA RECORDS

</footer>


</body>
</html>
